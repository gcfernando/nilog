# -----------------------------------------------------------------------------
#  Controls how GitHub groups the auto-generated release notes (the "Generate
#  release notes" button, and the release.yml workflow's generate_release_notes).
#
#  Pull requests are sorted into the categories below by their labels. Anything
#  without a matching label lands under "Other changes".
# -----------------------------------------------------------------------------

changelog:
  exclude:
    labels:
      - ignore-for-release
      - duplicate
      - invalid
      - wontfix

  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement

    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix

    - title: ⚡ Performance
      labels:
        - performance
        - perf

    - title: 📚 Documentation
      labels:
        - documentation
        - docs

    - title: 🧰 Maintenance
      labels:
        - chore
        - refactor
        - dependencies

    - title: 🧩 Other changes
      labels:
        - "*"
